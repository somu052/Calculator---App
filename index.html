<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="calculator.css">
  <title>Calculator</title>
</head>
<body>
<h1>Calculator</h1>
<form action="" name="clc">
  <div class="input-box">
  <input type="text" id="display" class="text">

  <span class="backspace" onclick="backspace()">
    ⌫
  </span>
</div>
  <br>
  <div class="btn">
   <button type="button" class="clear">C</button>
    <button type="button" class="symbol" style="width: auto; padding: auto;">( </button>
    <button type="button" class="symbol" style="width: auto; padding: auto;">)</button>
    <button type="button" class="symbol">%</button>
    <button type="button" class="symbol">/</button>
    <br>
    <button type="button" class="number">7</button>
    <button type="button" class="number">8</button>
    <button type="button" class="number">9</button>
    <button type="button" class="symbol">*</button>
    <br>
    <button type="button" class="number">4</button>
    <button type="button" class="number">5</button>
    <button type="button" class="number">6</button>
    <button type="button" class="symbol">-</button>
    <br>
    <button type="button" class="number">1</button>
    <button type="button" class="number">2</button>
    <button type="button" class="number">3</button>
    <button type="button" class="symbol">+</button>
    <br>
    <button type="button"class="zero" class="number">0</button >
    <button type="button" class="symbol">.</button>
    <button type="button" class="eval">=</button>
    <br>
  </div>

</form>
<script src="calculator.js"></script>
</body>
</html>
